<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI</title>
    <!-- 引入高品質字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Poppins:wght@200;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* 基礎設置與重設 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Noto Sans TC', sans-serif;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #0b0f19;
            color: #f1f5f9;
            overflow-x: hidden;
            position: relative;
        }
        /* 動態漣漪效果 Canvas */
        #ripple-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        /* 導航欄 */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        /* 首頁主視覺區 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 1.5rem;
            position: relative;
            z-index: 10;
        }
        .hero h1 {
            font-size: 7rem;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* 透明、細字細框版本徽章 */
        .version-badge {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 0.25rem 0.85rem;
            border: 1px solid rgba(56, 189, 248, 0.6);
            color: rgba(56, 189, 248, 0.9);
            font-size: 0.75rem;
            font-weight: 200;
            border-radius: 50px;
            margin-bottom: 3rem;
            background: transparent;
            letter-spacing: 1px;
        }
        /* Let's get start 按鈕 */
        .btn-started {
            display: inline-block;
            padding: 1rem 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .btn-started:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.6);
        }
        /* 下滑提示 */
        .scroll-down {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: #475569;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-decoration: none;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); }
            40% { transform: translate(-50%, -8px); }
            60% { transform: translate(-50%, -4px); }
        }

        /* ==========================================
           AI 對話視窗區 (預設隱藏，點擊按鈕後彈出)
           ========================================== */
        .chat-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(7, 10, 18, 0.95);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(20px);
        }
        .chat-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .chat-container {
            width: 90%;
            max-width: 650px;
            height: 80vh;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        /* 對話框標頭 */
        .chat-header {
            padding: 1.2rem 1.5rem;
            background: rgba(30, 41, 59, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-title {
            font-weight: 600;
            color: #38bdf8;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .close-chat {
            background: none;
            border: none;
            color: #64748b;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-chat:hover {
            color: #ef4444;
        }
        /* 訊息對話紀錄區 */
        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 80%;
            padding: 0.85rem 1.2rem;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: break-all;
        }
        .message.user {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.ai {
            background: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* 輸入區塊 */
        .chat-input-area {
            padding: 1.2rem;
            background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 0.75rem;
        }
        .chat-input {
            flex: 1;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.85rem 1.2rem;
            border-radius: 12px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .chat-input:focus {
            border-color: #38bdf8;
        }
        .btn-send {
            background: #38bdf8;
            color: #0b0f19;
            border: none;
            padding: 0 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-send:hover {
            background: #0ea5e9;
        }

        /* 內容呈現區 */
        .content-section {
            padding: 8rem 10% 4rem 10%;
            background-color: #070a12;
            position: relative;
            z-index: 10;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
        }
        /* 兩欄排版卡片 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 3rem;
            margin-bottom: 6rem;
        }
        .card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 3rem 2.5rem;
            border-radius: 16px;
            transition: transform 0.3s, border-color 0.3s;
            backdrop-filter: blur(8px);
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.25);
        }
        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            color: #38bdf8;
            font-weight: 700;
            border-left: 4px solid #7c3aed;
            padding-left: 0.8rem;
            line-height: 1.4;
        }
        .card p {
            color: #94a3b8;
            font-size: 1.05rem;
            line-height: 1.8;
            text-align: justify;
        }
        /* 頁尾 */
        footer {
            text-align: center;
            padding: 2rem;
            color: #475569;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            letter-spacing: 1px;
        }
        /* 響應式 RWD 調整 */
        @media (max-width: 768px) {
            .hero h1 { font-size: 4.5rem; }
            header { padding: 1.2rem 5%; }
            .content-section { padding: 6rem 5% 2rem 5%; }
        }
    </style>
</head>
<body>

    <!-- 背景動態漣漪效果 Canvas -->
    <canvas id="ripple-canvas"></canvas>

    <!-- 頂部導航欄 -->
    <header>
        <div class="logo">BI</div>
    </header>

    <!-- 1. 首頁主視覺區 -->
    <section class="hero">
        <h1>BI</h1>
        
        <!-- 透明、細字細框版本設計 -->
        <div class="version-badge">V1.0</div>
        
        <!-- Let's get start 按鈕 (綁定開啟對話框事件) -->
        <a href="javascript:void(0)" class="btn-started" id="start-btn">Let's get start</a>

        <!-- 下滑提示 -->
        <a href="#content" class="scroll-down">↓ 往下滾動</a>
    </section>

    <!-- ==========================================
       AI 對話視窗 HTML 架構
       ========================================== */ -->
    <div class="chat-overlay" id="chat-overlay">
        <div class="chat-container">
            <div class="chat-header">
                <div class="chat-title"><span>🤖</span> BI AI Studio</div>
                <button class="close-chat" id="close-btn">&times;</button>
            </div>
            <!-- 對話訊息渲染區 -->
            <div class="chat-messages" id="chat-messages"></div>
            <!-- 文字輸入發送區 -->
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chat-input" placeholder="輸入訊息..." autocomplete="off">
                <button class="btn-send" id="send-btn">發送</button>
            </div>
        </div>
    </div>

    <!-- 2. 內容呈現區 -->
    <section id="content" class="content-section">
        <div class="grid-container">
            <!-- 區塊 1 -->
            <div class="card">
                <h3>資料來源均取教育部辭典與參考書</h3>
                <p>針對翻譯的題型取材教育部辭典龐大資庫、題目課文採樣預計含誇國小，國中，高中，減少錯誤率。</p>
            </div>
            
            <!-- 區塊 2 -->
            <div class="card">
                <h3>不同於傳統</h3>
                <p>不追隨當代多維vector浪潮，作者發想，天馬行空兌現</p>
            </div>
        </div>

        <!-- 頁尾 -->
        <footer>
            吳秉洋發想 X gemini協助
        </footer>
    </section>

    <!-- JavaScript：處理基礎UI、LocalStorage 空間與留空執行邏輯 -->
    <script>
        /* ==========================================
           1. LocalStorage 對話紀錄初始化空間與讀取
           ========================================== */
        const STORAGE_KEY = 'BI_CHAT_HISTORY';
        
        // 從 LocalStorage 取得歷史紀錄，若無則初始化為空陣列
        let chatHistory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        // DOM 元素選取
        const startBtn = document.getElementById('start-btn');
        const closeBtn = document.getElementById('close-btn');
        const chatOverlay = document.getElementById('chat-overlay');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        // 渲染歷史對話到畫面上
        function renderHistory() {
            chatMessages.innerHTML = '';
            chatHistory.forEach(msg => {
                appendMessageToUI(msg.sender, msg.text);
            });
            scrollToBottom();
        }

        // 將訊息加入畫面的函式
        function appendMessageToUI(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender); // sender 可為 'user' 或 'ai'
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            scrollToBottom();
        }

        // 滾動到最底部
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 儲存目前對話到 LocalStorage
        function saveToStorage(sender, text) {
            chatHistory.push({ sender, text, timestamp: new Date().getTime() });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
        }

        /* ==========================================
           2. UI 互動事件 (開啟、關閉、發送)
           ========================================== */
        
        // 按下 Let's get start 開啟對話框
        startBtn.addEventListener('click', () => {
            chatOverlay.classList.add('active');
            renderHistory(); // 打開時加載歷史紀錄
        });

        // 關閉對話框
        closeBtn.addEventListener('click', () => {
            chatOverlay.classList.remove('active');
        });

        // 發送訊息按鈕事件
        sendBtn.addEventListener('click', handleUserSendMessage);
        // 綁定 Enter 鍵發送
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleUserSendMessage();
        });

        function handleUserSendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            // 1. 顯示使用者訊息並存入 LocalStorage
            appendMessageToUI('user', text);
            saveToStorage('user', text);
            chatInput.value = '';

            // 2. 觸發 AI 回覆執行空間
            // 這裡呼叫下方留給您的判斷與執行函式
            executeAIResponseLogic(text);
        }

        /* ==========================================
           3. 【留空區】判斷與執行交由您等一下寫的程式來填入
           ========================================== */
        function executeAIResponseLogic(userMessage) {
            console.log("接收到使用者訊息，等待載入您的判斷與執行邏輯: ", userMessage);
            
            /* 
               💡 提示：您等一下寫的程式可以在這裡：
               1. 判斷 userMessage 的關鍵字或丟給 API 處理。
               2. 得到結果後，呼叫：
                  appendMessageToUI('ai', "您的AI回覆內容");
                  saveToStorage('ai', "您的AI回覆內容");
            */
        }

        /* ==========================================
           4. 背景動態漣漪效果 Canvas 邏輯 (保持原樣)
           ========================================== */
        const canvas = document.getElementById('ripple-canvas');
        const ctx = canvas.getContext('2d');
        let ripples = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.random() * 80 + 140;
                this.opacity = 1;
                this.speed = Math.random() * 1.5 + 2;
            }
            update() {
                this.radius += this.speed;
                this.opacity = 1 - (this.radius / this.maxRadius);
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(129, 140, 248, ${this.opacity * 0.25})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        window.addEventListener('click', (e) => {
            // 如果點擊是在對話框內，不觸發背景漣漪以免干擾視覺
            if (chatOverlay.classList.contains('active') && e.target.closest('.chat-container')) return;
            ripples.push(new Ripple(e.clientX, e.clientY));
        });

        let moveTrack = 0;
        window.addEventListener('mousemove', (e) => {
            if (chatOverlay.classList.contains('active')) return;
            moveTrack++;
            if (moveTrack % 12 === 0) {
                ripples.push(new Ripple(e.clientX, e.clientY));
            }
        });

        setInterval(() => {
            if (chatOverlay.classList.contains('active')) return;
            const randomX = Math.random() * canvas.width;
            const randomY = Math.random() * canvas.height;
            ripples.push(new Ripple(randomX, randomY));
        }, 3000);

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ripples.forEach((ripple, index) => {
                ripple.update();
                ripple.draw();
                if (ripple.opacity <= 0) {
                    ripples.splice(index, 1);
                }
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
