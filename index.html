<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI</title>
    <!-- 引入高品質字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* 基礎設置與重設 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Noto Sans TC', sans-serif;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #0b0f19;
            color: #f1f5f9;
            overflow-x: hidden;
            position: relative;
        }
        /* 動態漣漪效果 Canvas */
        #ripple-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* 讓點擊與移動穿透 */
        }
        /* 導航欄 */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        /* 首頁主視覺區 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 1.5rem;
            position: relative;
            z-index: 10;
        }
        .hero h1 {
            font-size: 6rem; /* 放大 BI 字體大小 */
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero .subtitle {
            font-size: 1.8rem;
            color: #94a3b8;
            margin-bottom: 3rem;
            font-weight: 500;
            letter-spacing: 2px;
        }
        /* Let's get start 按鈕 */
        .btn-started {
            display: inline-block;
            padding: 1rem 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .btn-started:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.6);
        }
        /* 下滑提示 */
        .scroll-down {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: #475569;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-decoration: none;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); }
            40% { transform: translate(-50%, -8px); }
            60% { transform: translate(-50%, -4px); }
        }
        /* 內容呈現區 */
        .content-section {
            padding: 8rem 10% 4rem 10%;
            background-color: #070a12;
            position: relative;
            z-index: 10;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
        }
        /* 兩欄排版卡片 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 3rem;
            margin-bottom: 6rem;
        }
        .card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 3rem 2.5rem;
            border-radius: 16px;
            transition: transform 0.3s, border-color 0.3s;
            backdrop-filter: blur(8px);
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.25);
        }
        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            color: #38bdf8;
            font-weight: 700;
            border-left: 4px solid #7c3aed;
            padding-left: 0.8rem;
            line-height: 1.4;
        }
        .card p {
            color: #94a3b8;
            font-size: 1.05rem;
            line-height: 1.8;
            text-align: justify;
        }
        /* 頁尾 */
        footer {
            text-align: center;
            padding: 2rem;
            color: #475569;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            letter-spacing: 1px;
        }
        /* 響應式 RWD 調整 */
        @media (max-width: 768px) {
            .hero h1 { font-size: 4rem; }
            header { padding: 1.2rem 5%; }
            .content-section { padding: 6rem 5% 2rem 5%; }
        }
        .subtitle {
            height:20px;
            width:30px;
            boarder-width:2px;
            boarder-raidus:30px;
            boarder-color:blue;
        }
    </style>
</head>
<body>

    <!-- 背景動態漣漪效果 Canvas -->
    <canvas id="ripple-canvas"></canvas>

    <!-- 頂部導航欄 (僅保留 BI Logo) -->
    <header>
        <div class="logo">BI:語言訓練模型</div>
    </header>

    <!-- 1. 首頁主視覺區 -->
    <section class="hero">
        <h1>BI</h1>
        <div id="subtitle">V1.0</div>
        
        <!-- Let's get start 按鈕 -->
        <a href="#content" class="btn-started">Let's get start</a>

        <!-- 下滑提示 -->
        <a href="#content" class="scroll-down">↓ 往下滾動</a>
    </section>

    <!-- 2. 內容呈現區 -->
    <section id="content" class="content-section">
        <div class="grid-container">
            <!-- 區塊 1 -->
            <div class="card">
                <h3>資料來源均取教育部辭典與參考書</h3>
                <p>針對翻譯的題型取材教育部辭典龐大資庫、題目課文採樣預計含誇國小，國中，高中，減少錯誤率。</p>
            </div>
            
            <!-- 區塊 2 -->
            <div class="card">
                <h3>不同於傳統</h3>
                <p>不追隨當代多維vector浪潮，作者發想，天馬行空兌現</p>
            </div>
        </div>

        <!-- 頁尾 -->
        <footer>
            吳秉洋發想 X gemini協助
        </footer>
    </section>

    <!-- JavaScript：處理滑鼠與自動背景動態 Canvas 漣漪特效 -->
    <script>
        const canvas = document.getElementById('ripple-canvas');
        const ctx = canvas.getContext('2d');
        let ripples = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.random() * 80 + 140;
                this.opacity = 1;
                this.speed = Math.random() * 1.5 + 2;
            }
            update() {
                this.radius += this.speed;
                this.opacity = 1 - (this.radius / this.maxRadius);
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(129, 140, 248, ${this.opacity * 0.25})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        // 滑鼠點擊觸發漣漪
        window.addEventListener('click', (e) => {
            ripples.push(new Ripple(e.clientX, e.clientY));
        });

        // 滑鼠移動觸發細微漣漪
        let moveTrack = 0;
        window.addEventListener('mousemove', (e) => {
            moveTrack++;
            if (moveTrack % 12 === 0) {
                ripples.push(new Ripple(e.clientX, e.clientY));
            }
        });

        // 背景自動定時隨機漣漪（保持網頁動態感）
        setInterval(() => {
            const randomX = Math.random() * canvas.width;
            const randomY = Math.random() * canvas.height;
            ripples.push(new Ripple(randomX, randomY));
        }, 3000);

        // 渲染迴圈
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ripples.forEach((ripple, index) => {
                ripple.update();
                ripple.draw();
                if (ripple.opacity <= 0) {
                    ripples.splice(index, 1);
                }
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
