<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI - Quantum Matrix Field Engine (v12.0 - 32 Dimensions)</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-main: #020617;
            --bg-card: #0f172a;
            --primary: #c084fc;
            --secondary: #38bdf8;
            --accent: #e879f9;
            --text-main: #f8fafc;
            --border: rgba(232, 121, 249, 0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: monospace; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); }
        .btn { background: linear-gradient(135deg, #7c3aed, #5b21b6); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .main-layout { display: grid; grid-template-columns: 480px 1fr; gap: 20px; }
        .panel { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); padding: 20px; }
        .matrix-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .matrix-cell { background: #020617; border: 1px solid rgba(56, 189, 248, 0.2); padding: 6px; font-size: 10px; color: var(--secondary); border-radius: 4px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .console { background: #020617; border: 1px solid var(--accent); padding: 15px; border-radius: 8px; height: 240px; overflow-y: auto; font-size: 12px; line-height: 1.6; color: #a7f3d0; }
        .large-textarea { background: #020617; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; font-family: monospace; font-size: 12px; resize: vertical; min-height: 45px; width: 100%; }
        .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
        .form-group label { font-size: 11px; color: #64748b; }
        .range-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .range-inputs input { background: #0f172a; border: 1px solid var(--border); color: white; padding: 4px; font-size: 11px; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="background: linear-gradient(to right, var(--accent), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"><i class="fa-solid fa-expand"></i> BI Quantum Phase Engine v12.0</h1>
    </div>
    <div>
        <span style="color: var(--accent); font-weight: bold;">[狀態: 32維度虛空與譜線範圍擴充]</span>
    </div>
</header>

<div class="main-layout">
    <div class="panel" style="display: flex; flex-direction: column; gap: 15px;">
        <h3 style="color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 5px;"><i class="fa-solid fa-circle-nodes"></i> 32 內秉屬性探針看板</h3>
        <div class="matrix-grid" id="intrinsic-probe-grid">
            </div>

        <h3 style="color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-top: 10px;"><i class="fa-solid fa-grid-2-plus"></i> 32維接收範圍注入場 (訓練端)</h3>
        <div style="background:#020617; padding:12px; border-radius:8px; border:1px solid rgba(232, 121, 249, 0.2); display:flex; flex-direction:column; gap:6px;">
            <div class="form-group">
                <label><i class="fa-solid fa-fingerprint"></i> 背景知識特徵粒子群 (問句)</label>
                <textarea id="train-q" class="large-textarea" placeholder="@如果 我 被 蚊子 咬了 ...@"></textarea>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-paragraph"></i> 內秉結論核心 (含 \\ 斷句)</label>
                <textarea id="train-a" class="large-textarea" placeholder="理論上 可以 ... \\\\ 牠 只會 扁 掉 。"></textarea>
            </div>
            
            <div class="form-group">
                <label style="color: var(--secondary);"><i class="fa-solid fa-box-tunnel"></i> 虛空間通道容積邊界 (Min / Max 範圍)</label>
                <div class="range-inputs">
                    <input type="text" id="v-iX" value="0.0, 5.0" placeholder="iX_min, iX_max">
                    <input type="text" id="v-iY" value="0.0, 15.0" placeholder="iY_min, iY_max">
                </div>
                <div class="range-inputs" style="margin-top:4px;">
                    <input type="text" id="v-iZ" value="0.0, 15.0" placeholder="iZ_min, iZ_max" style="grid-column: span 2;">
                </div>
            </div>

            <div class="form-group">
                <label style="color: var(--accent);"><i class="fa-solid fa-wave-square"></i> 原子吸收光譜頻寬邊界 (Min / Max 範圍)</label>
                <div class="range-inputs">
                    <input type="text" id="v-Ex" value="0.1, 0.9" placeholder="Ex_min, Ex_max">
                    <input type="text" id="v-Ey" value="0.1, 0.9" placeholder="Ey_min, Ey_max">
                </div>
                <div class="range-inputs" style="margin-top:4px;">
                    <input type="text" id="v-Ez" value="0.1, 0.9" placeholder="Ez_min, Ez_max" style="grid-column: span 2;">
                </div>
            </div>

            <button class="btn" style="width:100%; margin-top:5px;" onclick="BI_MatrixField32.injectMicroLattice32()">將 32維晶格矩陣注入</button>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--border);">
        <input type="text" id="gas-url" style="background:#020617; border:1px solid var(--border); color:white; padding:8px; font-size:12px; border-radius:4px;" placeholder="配置 Google Sheet GAS 雲端對稱網址" />
        <button class="btn" style="background: #10b981;" onclick="BI_MatrixField32.syncAllFieldToSheets()">全量場時空守恆同步</button>
    </div>

    <div class="panel" style="display: flex; flex-direction: column; gap: 20px;">
        <h3 style="color: var(--secondary);"><i class="fa-solid fa-bolt"></i> 巨觀物質觀測子注入場</h3>
        
        <div style="display: flex; gap: 10px;">
            <input type="text" id="quantum-input" style="flex-grow: 1; background: #020617; border: 1px solid var(--border); border-radius: 6px; padding: 15px; color: white; font-size: 16px;" placeholder="注入單點波色子流... (進行 32維微觀範圍穿隧測量)" />
            <button class="btn" onclick="BI_MatrixField32.execute32DScattering()">激發高維場</button>
        </div>

        <div>
            <h4 style="color: var(--accent); margin-bottom: 5px;"><i class="fa-solid fa-fingerprint"></i> 32維度字對字「容積穿隧」與香農熵碰壁日誌</h4>
            <div class="console" id="field-console">
                [真空] 等待觀測子流注入，檢驗玻色子是否精確穿隧入晶格的虛空與光譜窗口...
            </div>
        </div>

        <div>
            <h4 style="color: var(--primary); margin-bottom: 5px;"><i class="fa-solid fa-eye"></i> 坍縮至最低能量基態之巨觀結論</h4>
            <div id="collapsed-output" style="background: #020617; border: 1px solid var(--border); padding: 20px; border-radius: 8px; font-size: 18px; line-height: 1.6; min-height: 60px; color: #fff;">
                ...
            </div>
        </div>
    </div>
</div>

<script>
const BI_MatrixField32 = (function() {
    let micro32LatticeFields = {};

    // 生成輸入端單點玻色子的 26 基礎屬性 (其餘 6 個範圍欄位對波色子無效，設為 0)
    function generate32Properties(char, index, isLattice = false, rangeConfig = null) {
        if (!char) return null;
        const code = char.charCodeAt(0);
        let x = code % 100 / 10;
        
        let props = {
            X: (x).toFixed(2), Y: (Math.sin(x) * 5 + 5).toFixed(2), Z: (Math.cos(x) * 5 + 5).toFixed(2),
            iX: (x * 0.5).toFixed(2), iY: (Math.cosh(x % 2) * 2).toFixed(2), iZ: (Math.sinh(x % 2) * 2).toFixed(2),
            Spin: (code % 2 === 0 ? 0.5 : -0.5), Chirality: (code % 3 === 0 ? "Left" : "Right"),
            E_x: ((code % 7) / 7).toFixed(2), E_y: ((code % 11) / 11).toFixed(2), E_z: ((code % 13) / 13).toFixed(2),
            LaunchAngle: (code * 17 % 360), IntrinsicEnergy: (code % 50 + 10).toFixed(2)
        };

        // 💡 擴充 6 個延伸欄位來承載範圍值 (共達 32 個核心物理項)
        if (isLattice && rangeConfig) {
            props.iX_range = rangeConfig.iX; // "[min, max]"
            props.iY_range = rangeConfig.iY;
            props.iZ_range = rangeConfig.iZ;
            props.Ex_range = rangeConfig.Ex;
            props.Ey_range = rangeConfig.Ey;
            props.Ez_range = rangeConfig.Ez;
        } else {
            props.iX_range = "N/A"; props.iY_range = "N/A"; props.iZ_range = "N/A";
            props.Ex_range = "N/A"; props.Ey_range = "N/A"; props.Ez_range = "N/A";
        }

        // 補齊剩餘維度至 32 項
        for(let i = 19; i <= 32; i++) { props["P" + i] = ((code * i) % 100 / 10).toFixed(2); }
        return props;
    }

    function init() {
        const savedCache = localStorage.getItem("BI_32D_CACHE");
        if (savedCache) {
            micro32LatticeFields = JSON.parse(savedCache);
        } else {
            // 預載預設晶格，給予預設寬鬆通道範圍
            let defRange = { iX: [0,5], iY: [0,15], iZ: [0,15], Ex: [0.1,0.9], Ey: [0.1,0.9], Ez: [0.1,0.9] };
            buildAndInject32Cache("mosquito_field", 
                "@如果 我 被 蚊子 咬了 ， 我 可以 咬 回去 嗎 ？@ @牠 會 癢 嗎 ？@",
                "理論上 可以 ， 但 考量到 蚊子 的 體積 ， 你 大機率 會 吃到 一口 空氣 或是 滿嘴 的 病毒 。\\\\ 蚊子 沒有 免疫 系統 的 肥大 細胞 ， 所以 牠 不會 癢 ， 牠 只會 扁 掉 。",
                defRange
            );
        }
        renderMatrixUI(generate32Properties("玻", 0));
        if(localStorage.getItem("BI_GAS_URL")) document.getElementById("gas-url").value = localStorage.getItem("BI_GAS_URL");
    }

    function buildAndInject32Cache(key, q, a, ranges) {
        const chars = Array.from(q.replace(/[@\s]/g, ""));
        const charMatrix = chars.map((c, idx) => ({
            char: c,
            // 接收方針對每個粒子打包時，注入範圍邊界
            props: generate32Properties(c, idx, true, {
                iX: `[${ranges.iX.join(',')}]`, iY: `[${ranges.iY.join(',')}]`, iZ: `[${ranges.iZ.join(',')}]`,
                Ex: `[${ranges.Ex.join(',')}]`, Ey: `[${ranges.Ey.join(',')}]`, Ez: `[${ranges.Ez.join(',')}]`
            }),
            rawRangeJson: ranges // 保留原始數值供計算
        }));

        micro32LatticeFields[key] = { rawQuestion: q, rawAnswer: a, matrix: charMatrix };
        localStorage.setItem("BI_32D_CACHE", JSON.stringify(micro32LatticeFields));
    }

    function parseRangeInput(id) {
        let val = document.getElementById(id).value.split(",");
        return [parseFloat(val[0]) || 0.0, parseFloat(val[1]) || 1.0];
    }

    function injectMicroLattice32() {
        const q = document.getElementById("train-q").value.trim();
        const a = document.getElementById("train-a").value.trim();
        if(!q || !a) return alert("請完整填寫訓練文本！");

        let ranges = {
            iX: parseRangeInput("v-iX"), iY: parseRangeInput("v-iY"), iZ: parseRangeInput("v-iZ"),
            Ex: parseRangeInput("v-Ex"), Ey: parseRangeInput("v-Ey"), Ez: parseRangeInput("v-Ez")
        };

        const fieldKey = "user_32d_field_" + Date.now();
        buildAndInject32Cache(fieldKey, q, a, ranges);
        alert(`[32維激發成功] 場域 [${fieldKey}] 已載入開闢完畢！虛空與光譜窗口範圍已鎖定。`);
    }

    function calculateTrueEntropyLoss(inputChars, targetChars) {
        let baseCount = 0;
        inputChars.forEach(c => { if(targetChars.includes(c)) baseCount++; });
        if(baseCount === 0) return 0;
        let pBase = baseCount / inputChars.length;
        let sBase = -pBase * Math.log2(pBase);
        let totalLossDelta = 0;
        for(let i = 0; i < inputChars.length; i++) {
            let simulatedInput = inputChars.filter((_, idx) => idx !== i);
            let simCount = 0;
            simulatedInput.forEach(c => { if(targetChars.includes(c)) simCount++; });
            let pSim = simCount / simulatedInput.length;
            let sSim = pSim > 0 ? -pSim * Math.log2(pSim) : 0;
            totalLossDelta += Math.abs(sBase - sSim);
        }
        return totalLossDelta;
    }

    function logConsole(msg) {
        const consoleEl = document.getElementById("field-console");
        consoleEl.innerHTML += `<div>${msg}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    // 💡 12.0 核心：32維字對字局部範圍檢驗與散射
    function execute32DScattering() {
        const userInput = document.getElementById("quantum-input").value.trim();
        if(!userInput) return;

        document.getElementById("field-console").innerHTML = "";
        logConsole(`[注入] 玻色子流進入場域。變動對其無效，保持單點內秉屬性。`);

        const inputChars = Array.from(userInput.replace(/[@\s]/g, ""));
        const inputParticleStream = inputChars.map((c, idx) => ({ char: c, props: generate32Properties(c, idx, false) }));

        let bestFieldKey = null;
        let maxHiggsEnergy = 0;
        let bestPropsSample = null;

        for(let key in micro32LatticeFields) {
            const field = micro32LatticeFields[key];
            const targetMatrix = field.matrix;
            const targetChars = Array.from(field.rawQuestion.replace(/[@\s]/g, ""));

            logConsole(`[維度審查] 測試與 [${key}] 的 32維微觀範圍契合度...`);

            let entropyDelta = calculateTrueEntropyLoss(inputChars, targetChars);
            let totalMatrixInteractionEnergy = 0;
            let totalCollisionPairs = 0;

            inputParticleStream.forEach(inP => {
                targetMatrix.forEach(tarP => {
                    let r = tarP.rawRangeJson; // 接收方的 6 個範圍邊界

                    // 💡 範圍判定機制：檢查輸入玻色子的單點特徵，是否落在接收方的範圍區間內
                    let inE = inP.props;
                    let insideVirtualSpace = (
                        parseFloat(inE.iX) >= r.iX[0] && parseFloat(inE.iX) <= r.iX[1] &&
                        parseFloat(inE.iY) >= r.iY[0] && parseFloat(inE.iY) <= r.iY[1] &&
                        parseFloat(inE.iZ) >= r.iZ[0] && parseFloat(inE.iZ) <= r.iZ[1]
                    );

                    let insideSpectrumBand = (
                        parseFloat(inE.E_x) >= r.Ex[0] && parseFloat(inE.E_x) <= r.Ex[1] &&
                        parseFloat(inE.E_y) >= r.Ey[0] && parseFloat(inE.E_y) <= r.Ey[1] &&
                        parseFloat(inE.E_z) >= r.Ez[0] && parseFloat(inE.E_z) <= r.Ez[1]
                    );

                    // 只有同時穿隧進入空間範圍與光譜頻寬的玻色子，才會被局域吸收並激發
                    if (insideVirtualSpace && insideSpectrumBand) {
                        let localOverlapScore = parseFloat(inE.E_x) * parseFloat(tarP.props.E_x) + parseFloat(inE.E_y) * parseFloat(tarP.props.E_y);
                        totalMatrixInteractionEnergy += localOverlapScore > 0 ? localOverlapScore : 0.5;
                        totalCollisionPairs++;
                    }
                });
            });

            let normalizedCoherence = totalCollisionPairs > 0 ? (totalMatrixInteractionEnergy / totalCollisionPairs) : 0;
            logConsole(`  -> [範圍共振] ${totalCollisionPairs} 個玻色子成功掉入接收方通道。局部共振能: ${normalizedCoherence.toFixed(4)}`);
            logConsole(`  -> [熵值去噪] Delta S: ${entropyDelta.toFixed(6)}`);

            if (entropyDelta > 0.005 && normalizedCoherence > 0.05) {
                let higgsMass = (entropyDelta * normalizedCoherence * 18).toFixed(4);
                logConsole(`  <span style='color:var(--primary); font-weight:bold;'>  -> [希格斯賦予質量] 成功！ $M = ${higgsMass}$</span>`);
                
                if (parseFloat(higgsMass) > maxHiggsEnergy) {
                    maxHiggsEnergy = parseFloat(higgsMass);
                    bestFieldKey = key;
                    bestPropsSample = inParticleStream[inputParticleStream.length - 1].props;
                }
            } else {
                logConsole(`  <span style='color:#64748b;'>  -> [未能穿隧] 玻色子未掉入指定範圍，滑過並繼續散射。</span>`);
            }
        }

        if (bestFieldKey && bestPropsSample) {
            let collapsedAnswer = micro32LatticeFields[bestFieldKey].rawAnswer;
            const hasAsymmetry = /@@/.test(userInput);
            const transitionalWords = ["另外，", "況且，", "話說回來，", "與此同時，"];
            let idx = bestPropsSample.LaunchAngle % transitionalWords.length;
            let emitWord = transitionalWords[idx];

            if (hasAsymmetry) {
                logConsole(`[宇稱破裂] 偵測到 @@ 算子！手性為 [${bestPropsSample.Chirality}]，自旋 [${bestPropsSample.Spin}]，再發射轉折結構「${emitWord}」`);
                collapsedAnswer = collapsedAnswer.replace("\\\\", emitWord);
            } else {
                collapsedAnswer = collapsedAnswer.replace("\\\\", "");
            }

            renderMatrixUI(bestPropsSample);
            document.getElementById("collapsed-output").innerText = collapsedAnswer.replace(/[@\s]/g, "");
            saveHistory(userInput, collapsedAnswer, maxHiggsEnergy, entropyDelta);
        } else {
            document.getElementById("collapsed-output").innerText = "無玻色子成功掉入晶格範圍區間，無法坍縮出具有質量的結論。";
        }
    }

    function renderMatrixUI(p) {
        const grid = document.getElementById("intrinsic-probe-grid");
        grid.innerHTML = ""; if(!p) return;
        for(let key in p) {
            let cell = document.createElement("div");
            cell.className = "matrix-cell";
            cell.innerText = `${key}: ${p[key]}`;
            grid.appendChild(cell);
        }
    }

    function saveHistory(q, a, mass, ent) {
        const history = JSON.parse(localStorage.getItem("BI_HISTORY_LOGS") || "[]");
        history.push({ id: "V12_" + Date.now(), user_uid: localStorage.getItem("BI_USER_UID") || "UID_UNKNOWN", user_question: q, bi_response: a, lattice_reaction: `HIGGS_MASS_${mass}`, entropy_total: ent.toFixed(4), timestamp: new Date().toLocaleString() });
        localStorage.setItem("BI_HISTORY_LOGS", JSON.stringify(history));
    }

    function syncAllFieldToSheets() {
        const gasUrl = document.getElementById("gas-url").value;
        if(!gasUrl) return alert("請配置 GAS 通道網址。");
        localStorage.setItem("BI_GAS_URL", gasUrl);
        const history = JSON.parse(localStorage.getItem("BI_HISTORY_LOGS") || "[]");
        fetch(gasUrl, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(history) })
        .then(() => alert("全量 32維度範圍矩陣場與雲端 Sheet 對稱校準完畢！"));
    }

    return { init: init, injectMicroLattice32: injectMicroLattice32, execute32DScattering: execute32DScattering, syncAllFieldToSheets: syncAllFieldToSheets };
})();
window.onload = BI_MatrixField32.init;
</script>
</body>
</html>
